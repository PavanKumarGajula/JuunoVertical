<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptop Migration – Slide 1 Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
    background: #020608;
  }

  .page {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── BACKGROUND ── */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.16) saturate(0.4);
    z-index: 0;
  }

  .overlay {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 90% 55% at 50% 50%, rgba(0,212,232,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 100% 28% at 50% 0%, rgba(0,0,0,0.96) 0%, transparent 75%),
      radial-gradient(ellipse 100% 28% at 50% 100%, rgba(0,0,0,0.98) 0%, transparent 75%),
      linear-gradient(180deg, rgba(2,6,8,0.72) 0%, rgba(2,6,8,0.18) 24%, rgba(2,6,8,0.18) 76%, rgba(2,6,8,0.9) 100%);
  }

  /* ── TOP ACCENT LINE ── */
  .top-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 20;
    background: linear-gradient(90deg, transparent 5%, #00D4E8 30%, #73F3FF 50%, #00D4E8 70%, transparent 95%);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:.8} 50%{opacity:1;filter:brightness(1.5)} }

  /* Corner marks */
  .corner { position: absolute; width: 22px; height: 22px; z-index: 10; }
  .corner.tl { top: 52px; left: 54px; border-top: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.tr { top: 52px; right: 54px; border-top: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }
  .corner.bl { bottom: 52px; left: 54px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.br { bottom: 52px; right: 54px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }

  /* ── PARTICLES ── */
  canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  /* ── MAIN COLUMN ── */
  .col {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 900px;
    padding-top: 80px;
  }

  /* ── ICON STRIP ── */
  .icon-strip {
    position: relative;
    width: 100%;
    height: 82px;
    margin-bottom: 80px;
    overflow: hidden;
  }

  .icon-strip::before, .icon-strip::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 100px;
    z-index: 5;
  }
  .icon-strip::before { left: 0; background: linear-gradient(90deg, rgba(2,6,8,1), transparent); }
  .icon-strip::after { right: 0; background: linear-gradient(-90deg, rgba(2,6,8,1), transparent); }

  .strip-track {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    transform: translateY(-50%);
    background: repeating-linear-gradient(90deg,
      rgba(0,212,232,.2) 0px, rgba(0,212,232,.2) 10px,
      transparent 10px, transparent 22px
    );
  }

  .fly-item {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    will-change: left, opacity;
  }

  .fly-icon-el {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(0,212,232,0.7));
  }

  .fly-at {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #00D4E8;
    text-shadow: 0 0 12px rgba(0,212,232,0.8);
    line-height: 1;
  }

  .fly-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(0,212,232,.5);
  }

  /* ── EYEBROW ── */
  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 34px;
    opacity: 0; animation: fadeUp .8s .3s cubic-bezier(.22,1,.36,1) forwards;
  }
  .eyebrow-line { width: 30px; height: 1px; background: #00D4E8; opacity: .5; }
  .eyebrow-text {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(0,212,232,.8);
    text-align: center;
  }

  /* ── HEADLINE ── */
  .headline {
    font-size: 112px;
    font-weight: 900;
    line-height: .92;
    letter-spacing: -.05em;
    color: #fff;
    text-align: center;
    margin-bottom: 34px;
    opacity: 0; animation: fadeUp 1s .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .headline .accent { color: #00D4E8; display: block; }

  /* ── SUBTEXT ── */
  .subtext {
    font-size: 31px;
    font-weight: 300;
    line-height: 1.45;
    color: rgba(255,255,255,.65);
    text-align: center;
    max-width: 820px;
    margin-bottom: 64px;
    opacity: 0; animation: fadeUp .85s .72s cubic-bezier(.22,1,.36,1) forwards;
  }
  .subtext strong { color: rgba(255,255,255,.94); font-weight: 700; }

  /* ── DOMAIN STACK ── */
  .domain-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    margin-bottom: 70px;
    opacity: 0; animation: fadeUp .8s .9s ease forwards;
  }

  .domain-chip {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    padding: 24px 44px;
    border-radius: 18px;
    width: 760px;
  }

  .domain-chip.old {
    background: rgba(255,255,255,.045);
    border: 1px solid rgba(255,255,255,.1);
  }

  .domain-chip.new {
    background: rgba(0,212,232,.08);
    border: 1px solid rgba(0,212,232,.35);
    box-shadow: 0 0 40px rgba(0,212,232,.08), inset 0 0 20px rgba(0,212,232,.03);
  }

  .chip-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .24em;
    text-transform: uppercase;
  }
  .domain-chip.old .chip-label { color: rgba(255,255,255,.3); }
  .domain-chip.new .chip-label { color: rgba(0,212,232,.68); }

  .chip-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    text-align: center;
    word-break: break-word;
  }
  .domain-chip.old .chip-val { color: rgba(255,255,255,.45); }
  .domain-chip.new .chip-val { color: #00D4E8; }

  .domain-arrow {
    font-size: 44px;
    color: rgba(0,212,232,.55);
    transform: rotate(90deg);
    animation: nudgeDown 1.8s ease-in-out infinite;
  }
  @keyframes nudgeDown {
    0%,100% { transform: rotate(90deg) translateX(0); opacity:.45; }
    50% { transform: rotate(90deg) translateX(8px); opacity:1; }
  }

  /* ── DATE / TIME STACK ── */
  .datetime-row {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 18px;
    width: 760px;
    opacity: 0; animation: fadeUp .8s 1.1s ease forwards;
  }

  .dt-chip {
    display: flex; align-items: center; gap: 18px;
    padding: 24px 28px;
    border: 1px solid rgba(0,212,232,.2);
    background: rgba(0,212,232,.05);
    border-radius: 18px;
  }

  .dt-icon { font-size: 34px; line-height: 1; }

  .dt-text { display: flex; flex-direction: column; gap: 4px; }
  .dt-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(0,212,232,.55);
  }
  .dt-value {
    font-size: 34px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.01em;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(32px); }
    to { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>
<div class="page">

  <img class="bg-photo"
    src="https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=1400&q=90"
    alt="Lenovo ThinkPad" />
  <div class="overlay"></div>

  <div class="top-line"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <canvas id="particles"></canvas>

  <div class="col">

    <div class="icon-strip">
      <div class="strip-track"></div>
      <div id="flyZone"></div>
    </div>

    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span class="eyebrow-text">PwrQ Branch · Company-Wide IT Update</span>
      <div class="eyebrow-line"></div>
    </div>

    <h1 class="headline">
      Account
      <span class="accent">Migration.</span>
    </h1>

    <p class="subtext">
      Your laptop stays. Your domain changes.<br>
      All <strong>PwrQ</strong> laptops are moving to the <strong>Forgent Power</strong> Microsoft 365 tenant.
    </p>

    <div class="domain-row">
      <div class="domain-chip old">
        <span class="chip-label">Current Domain</span>
        <span class="chip-val">@pwrq.com</span>
      </div>

      <div class="domain-arrow">⟶</div>

      <div class="domain-chip new">
        <span class="chip-label">New Domain</span>
        <span class="chip-val">@forgentpower.com</span>
      </div>
    </div>

    <div class="datetime-row">
      <div class="dt-chip">
        <div class="dt-icon">📅</div>
        <div class="dt-text">
          <span class="dt-label">Migration Dates</span>
          <span class="dt-value">April 6 – 9</span>
        </div>
      </div>

      <div class="dt-chip">
        <div class="dt-icon">🕖</div>
        <div class="dt-text">
          <span class="dt-label">Starts Each Night</span>
          <span class="dt-value">7:00 PM</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ── PARTICLES ── */
const cv = document.getElementById('particles');
const cx = cv.getContext('2d');
cv.width = 1080;
cv.height = 1920;

const pts = Array.from({length: 65}, () => ({
  x: Math.random() * 1080,
  y: Math.random() * 1920,
  r: Math.random() * 1.3 + 0.3,
  vx: (Math.random() - 0.5) * 0.22,
  vy: (Math.random() - 0.5) * 0.22,
  a: Math.random() * 0.3 + 0.05
}));

(function draw(){
  cx.clearRect(0, 0, 1080, 1920);
  pts.forEach(p => {
    cx.beginPath();
    cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(0,212,232,${p.a})`;
    cx.fill();

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0) p.x = 1080;
    if (p.x > 1080) p.x = 0;
    if (p.y < 0) p.y = 1920;
    if (p.y > 1920) p.y = 0;
  });
  requestAnimationFrame(draw);
})();

/* ── FLYING ICONS ── */
const zone = document.getElementById('flyZone');
const STRIP_W = 900;

const items = [
  { type:'at' },
  { type:'icon', val:'📁' },
  { type:'at' },
  { type:'icon', val:'📄' },
  { type:'at' },
  { type:'icon', val:'📅' },
  { type:'icon', val:'📁' },
  { type:'at' },
  { type:'icon', val:'📧' },
  { type:'at' },
  { type:'icon', val:'🗂️' },
];

const vertOffsets = [-18, 0, 18];
let idx = 0;

function launch() {
  const def = items[idx % items.length];
  idx++;

  const wrap = document.createElement('div');
  wrap.className = 'fly-item';
  wrap.style.top = `calc(50% + ${vertOffsets[Math.floor(Math.random()*vertOffsets.length)]}px)`;

  if (def.type === 'at') {
    const a = document.createElement('div');
    a.className = 'fly-at';
    a.textContent = '@';

    const lb = document.createElement('div');
    lb.className = 'fly-label';
    lb.textContent = 'email';

    wrap.appendChild(a);
    wrap.appendChild(lb);
  } else {
    const ic = document.createElement('div');
    ic.className = 'fly-icon-el';
    ic.textContent = def.val;

    const lb = document.createElement('div');
    lb.className = 'fly-label';

    const map = {
      '📁':'files',
      '📄':'docs',
      '📅':'calendar',
      '📧':'mail',
      '🗂️':'folders'
    };
    lb.textContent = map[def.val] || 'data';

    wrap.appendChild(ic);
    wrap.appendChild(lb);
  }

  zone.appendChild(wrap);

  const dur = 2200 + Math.random() * 600;
  let start = null;

  function tick(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    const eased = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;

    wrap.style.left = (eased * STRIP_W) + 'px';
    wrap.style.opacity = p < 0.1
      ? (p / 0.1).toString()
      : p > 0.88
        ? ((1 - p) / 0.12).toString()
        : '1';

    const bob = Math.sin(p * Math.PI * 3) * 6;
    wrap.style.transform = `translateY(calc(-50% + ${bob}px))`;

    if (p < 1) requestAnimationFrame(tick);
    else if (zone.contains(wrap)) zone.removeChild(wrap);
  }

  requestAnimationFrame(tick);
}

setTimeout(() => {
  launch();
  setInterval(launch, 550);
}, 800);
</script>
</body>
</html>
