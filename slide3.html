<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptop Migration – Slide 4 Vertical</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
    background: #020608;
  }

  .page {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.13) saturate(0.3);
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 85% 55% at 50% 42%, rgba(0,212,232,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 100% 24% at 50% 0%, rgba(0,0,0,0.95) 0%, transparent 80%),
      radial-gradient(ellipse 100% 24% at 50% 100%, rgba(0,0,0,0.98) 0%, transparent 80%),
      linear-gradient(180deg, rgba(2,6,8,0.76) 0%, rgba(2,6,8,0.18) 26%, rgba(2,6,8,0.14) 68%, rgba(2,6,8,0.94) 100%);
  }

  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    z-index: 20;
    background: linear-gradient(90deg, transparent 5%, #00D4E8 30%, #73F3FF 50%, #00D4E8 70%, transparent 95%);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100% { opacity: .8; }
    50% { opacity: 1; filter: brightness(1.5); }
  }

  .corner { position: absolute; width: 22px; height: 22px; z-index: 10; }
  .corner.tl { top: 52px; left: 54px; border-top: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.tr { top: 52px; right: 54px; border-top: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }
  .corner.bl { bottom: 52px; left: 54px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.br { bottom: 52px; right: 54px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }

  canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .layout {
    position: relative;
    z-index: 10;
    width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 34px;
    text-align: center;
  }

  .illustration {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 1s .2s cubic-bezier(.22,1,.36,1) forwards;
  }

  .illustration img {
    width: 520px;
    height: auto;
    filter: drop-shadow(0 0 40px rgba(0,212,232,0.15));
    animation: floatIllus 5s ease-in-out infinite;
  }

  @keyframes floatIllus {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }

  .right {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp .8s .3s cubic-bezier(.22,1,.36,1) forwards;
  }

  .eyebrow-line {
    width: 28px;
    height: 1px;
    background: #00D4E8;
    opacity: .5;
  }

  .eyebrow-text {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(0,212,232,.82);
    text-align: center;
  }

  .headline {
    font-size: 108px;
    font-weight: 900;
    line-height: .9;
    letter-spacing: -.045em;
    color: #fff;
    margin-bottom: 42px;
    opacity: 0;
    animation: fadeUp .95s .42s cubic-bezier(.22,1,.36,1) forwards;
  }

  .headline .accent {
    color: #00D4E8;
    display: block;
  }

  .info-blocks {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
  }

  .info-block {
    display: flex;
    align-items: flex-start;
    gap: 22px;
    padding: 24px 24px;
    border-radius: 18px;
    text-align: left;
    opacity: 0;
  }

  .info-block:nth-child(1) {
    animation: fadeUp .75s .55s ease forwards;
    background: rgba(0,212,232,.07);
    border: 1px solid rgba(0,212,232,.3);
  }

  .info-block:nth-child(2) {
    animation: fadeUp .75s .70s ease forwards;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
  }

  .info-block:nth-child(3) {
    animation: fadeUp .75s .85s ease forwards;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
  }

  .block-icon {
    font-size: 42px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .block-text {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .block-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(0,212,232,.55);
  }

  .block-value {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -.02em;
    line-height: 1.14;
  }

  .block-sub {
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,.42);
    line-height: 1.45;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
const cv = document.getElementById('particles');
const cx = cv.getContext('2d');
cv.width = 1080;
cv.height = 1920;

const pts = Array.from({length: 58}, () => ({
  x: Math.random() * 1080,
  y: Math.random() * 1920,
  r: Math.random() * 1.3 + 0.3,
  vx: (Math.random() - 0.5) * 0.22,
  vy: (Math.random() - 0.5) * 0.22,
  a: Math.random() * 0.28 + 0.04
}));

(function draw() {
  cx.clearRect(0, 0, 1080, 1920);
  pts.forEach(p => {
    cx.beginPath();
    cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    cx.fillStyle = `rgba(0,212,232,${p.a})`;
    cx.fill();

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0) p.x = 1080;
    if (p.x > 1080) p.x = 0;
    if (p.y < 0) p.y = 1920;
    if (p.y > 1920) p.y = 0;
  });

  requestAnimationFrame(draw);
})();
</script>
